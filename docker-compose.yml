# Local Postgres (with pgvector) for LIVE-mode and the fully-local backend.
# Not needed for the default mock demo.
#   docker compose up -d
#   # LIVE (managed gen) data source:
#   #   DATABASE_URL=postgres://brain:brain@localhost:5432/company_brain  &&  npm run seed:db
#   # LOCAL backend (Ollama + pgvector, $0/query):
#   #   LLM_BACKEND=local  VECTOR_DATABASE_URL=postgres://brain:brain@localhost:5432/company_brain
#   #   (run `ollama serve` + `ollama pull llama3.2:1b nomic-embed-text`, then `npm run sync:full`)
services:
  postgres:
    # pgvector image = stock Postgres 16 + the `vector` extension the local backend needs.
    image: pgvector/pgvector:pg16
    container_name: company-brain-db
    environment:
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: brain
      POSTGRES_DB: company_brain
    ports:
      - '5432:5432'
    volumes:
      - brain-db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U brain -d company_brain']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  brain-db:
